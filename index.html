<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#10b981" />
<title>MoneyMatrix - Enterprise Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<link rel="manifest" href='data:application/manifest+json,{"name":"MoneyMatrix","short_name":"MoneyMatrix","start_url":".","display":"standalone","background_color":"%23f3f4f6","theme_color":"%2310b981","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 rx=%2740%27 fill=%27%2310b981%27/%3E%3Ctext x=%2796%27 y=%27132%27 font-size=%27110%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27Arial%27 font-weight=%27bold%27%3E%E2%82%B9%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}' />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%2310b981'/%3E%3Ctext x='96' y='132' font-size='110' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%E2%82%B9%3C/text%3E%3C/svg%3E" />
<style>
  :root { 
    --primary: #10b981; 
    --primary-hover: #059669; 
    --primary-gradient: linear-gradient(135deg, #10b981, #059669);
    --bg: #f3f6f8; 
    --surface: #ffffff; 
    --text: #0f172a; 
    --text-muted: #64748b; 
    --border: #e2e8f0; 
    --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
    --hover-shadow: 0 20px 40px -5px rgba(16, 185, 129, 0.15);
  }
  
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html, body { overflow-x: hidden; }
  body{font-family:'Inter', sans-serif;background:var(--bg);color:var(--text);letter-spacing:-0.01em;min-height:100vh}
  .hidden{display:none!important}
  button, a {font-family:inherit;cursor:pointer;border:none;outline:none;text-decoration:none}
  input,select,textarea{font-family:inherit;font-size:15px;outline:none;transition:all .2s ease;color:var(--text)}
  input:focus,select:focus,textarea:focus{border-color:var(--primary)!important;box-shadow:0 0 0 4px rgba(16,185,129,.15)}

  /* Custom Scrollbar for sleek UI */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Sidebar */
  .sidebar{width:260px;background:#0b1121;min-height:100vh;height:100vh;position:fixed;left:0;top:0;color:#fff;padding:24px 0;transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1);z-index:100;box-shadow:4px 0 25px rgba(0,0,0,.1);overflow-y:auto;padding-bottom:80px}
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
  
  .sidebar-brand{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:12px}
  .sidebar-brand h1{font-size:1.5rem;font-weight:800;color:var(--primary);letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
  .sidebar-brand p{font-size:.75rem;color:#94a3b8;margin-top:6px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .nav-item{padding:14px 24px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:14px;border-left:4px solid transparent;font-size:.95rem;color:#94a3b8;font-weight:500}
  .nav-item:hover{background:rgba(255,255,255,0.03);color:#fff}
  .nav-item.active{background:rgba(16,185,129,0.1);border-left-color:var(--primary);color:var(--primary);font-weight:700}
  .nav-item i{width:20px;text-align:center;font-size:1.15rem}
  .nav-divider{border-top:1px solid rgba(255,255,255,0.05);margin:12px 0}

  /* Main Area */
  .main{margin-left:260px;padding:30px;min-height:100vh;max-width:1600px;margin-right:auto;overflow-x:hidden}
  
  /* Topbar */
  .topbar{background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:18px 30px;border-radius:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;box-shadow:0 4px 20px rgba(0,0,0,.03);position:sticky;top:20px;z-index:90;border:1px solid rgba(255,255,255,0.5)}
  .topbar h2{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px}
  .topbar-right{display:flex;align-items:center;gap:12px;font-size:.9rem;flex-wrap:wrap}
  
  /* Badges & Pills */
  .pill{padding:6px 14px;border-radius:999px;font-size:.75rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
  .pill-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
  .pill-purple{background:#faf5ff;color:#7e22ce;border:1px solid #e9d5ff}

  /* Switcher */
  .switcher{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center;background:var(--surface);padding:10px 20px;border-radius:16px;box-shadow:var(--card-shadow)}
  .switcher .lbl{font-size:.8rem;color:var(--text-muted);margin-right:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .chip{padding:8px 20px;border-radius:999px;font-size:.85rem;border:1px solid var(--border);background:var(--bg);transition:all .2s ease;font-weight:600;color:var(--text)}
  .chip:hover{border-color:var(--primary);color:var(--primary);background:var(--surface)}
  .chip.active{background:var(--primary-gradient);color:#fff;border-color:transparent;box-shadow:0 4px 10px rgba(16,185,129,.3)}

  /* Cards */
  .card{background:var(--surface);border-radius:24px;padding:30px;box-shadow:var(--card-shadow);margin-bottom:30px;border:1px solid rgba(255,255,255,0.8);transition:transform .3s ease, box-shadow .3s ease}
  .card:hover{box-shadow:0 15px 35px -5px rgba(0, 0, 0, 0.06)}
  .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:15px;flex-wrap:wrap;padding-bottom:15px;border-bottom:1px solid #f1f5f9}
  .card-title{font-size:1.2rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}

  /* Stats Grid */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:30px}
  .stat{background:var(--surface);border-radius:20px;padding:24px;box-shadow:var(--card-shadow);border:1px solid rgba(255,255,255,0.8);display:flex;align-items:center;gap:18px;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1)}
  .stat:hover{transform:translateY(-5px);box-shadow:var(--hover-shadow)}
  .stat-ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.5)}
  .ic-green{background:linear-gradient(135deg, #d1fae5, #a7f3d0);color:#059669}
  .ic-blue{background:linear-gradient(135deg, #dbeafe, #bfdbfe);color:#2563eb}
  .ic-amber{background:linear-gradient(135deg, #fef3c7, #fde68a);color:#d97706}
  .ic-red{background:linear-gradient(135deg, #fee2e2, #fecaca);color:#dc2626}
  .ic-purple{background:linear-gradient(135deg, #f3e8ff, #e9d5ff);color:#7e22ce}
  .ic-teal{background:linear-gradient(135deg, #ccfbf1, #99f6e4);color:#0f766e}
  .stat-info{flex:1}
  .stat-val{font-size:1.7rem;font-weight:800;line-height:1.2;color:var(--text);letter-spacing:-0.5px}
  .stat-lbl{font-size:.85rem;color:var(--text-muted);font-weight:600;margin-top:4px}

  /* Buttons */
  .btn{padding:12px 22px;border-radius:10px;font-size:.9rem;font-weight:700;transition:all .2s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.3px;white-space:nowrap}
  .btn:active{transform:scale(0.97)}
  .btn-primary{background:var(--primary-gradient);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.2)}
  .btn-primary:hover{box-shadow:0 6px 15px rgba(16,185,129,.3);transform:translateY(-1px)}
  .btn-blue{background:linear-gradient(135deg, #3b82f6, #2563eb);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.2)}
  .btn-blue:hover{box-shadow:0 6px 15px rgba(59,130,246,.3);transform:translateY(-1px)}
  .btn-amber{background:linear-gradient(135deg, #f59e0b, #d97706);color:#fff;box-shadow:0 4px 12px rgba(245,158,11,.2)}
  .btn-amber:hover{box-shadow:0 6px 15px rgba(245,158,11,.3);transform:translateY(-1px)}
  .btn-whatsapp{background:linear-gradient(135deg, #25D366, #128C7E);color:#fff;box-shadow:0 4px 12px rgba(37,211,102,.2)}
  .btn-whatsapp:hover{box-shadow:0 6px 15px rgba(37,211,102,.3);transform:translateY(-1px)}
  .btn-red{background:linear-gradient(135deg, #ef4444, #dc2626);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.2)}
  .btn-red:hover{box-shadow:0 6px 15px rgba(239,68,68,.3);transform:translateY(-1px)}
  .btn-gray{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
  .btn-gray:hover{background:#e2e8f0;color:#0f172a}
  .btn-sm{padding:8px 14px;font-size:.8rem;border-radius:8px}

  /* Inputs & Filters */
  .search{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:14px;background:#fff;box-shadow:inset 0 2px 4px rgba(0,0,0,.02)}
  .filter-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;background:#f8fafc;padding:12px;border-radius:14px;border:1px solid var(--border)}
  .filter-row .search{margin-bottom:0;flex:1;background:var(--surface);border:1px solid #cbd5e1}
  .filter-row select{padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:#fff;min-width:160px;font-weight:500;box-shadow:inset 0 2px 4px rgba(0,0,0,.02)}

  /* Tables */
  table{width:100%;border-collapse:separate;border-spacing:0}
  th,td{padding:16px 14px;text-align:left;font-size:.9rem}
  th{background:#f8fafc;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;font-size:.75rem;border-bottom:2px solid var(--border)}
  th:first-child{border-top-left-radius:12px} th:last-child{border-top-right-radius:12px}
  td{border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
  tr{transition:background .2s}
  tr:hover td{background:#f8fafc}
  .tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
  
  .badge{padding:6px 12px;border-radius:8px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;justify-content:center}
  .bg-green{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
  .bg-amber{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
  .bg-gray{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
  .bg-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

  .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .empty i{font-size:3.5rem;margin-bottom:16px;opacity:.3;background:-webkit-linear-gradient(#94a3b8, #cbd5e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  /* Action Center Alert */
  .alert-box{background:linear-gradient(to right, #fffbeb, #ffffff);border-left:4px solid #f59e0b;padding:20px;border-radius:12px 16px 16px 12px;margin-bottom:24px;box-shadow:var(--card-shadow);position:relative;border:1px solid #fef3c7;animation:slideDown 0.4s ease}
  @keyframes slideDown { from {opacity:0; transform:translateY(-10px)} to {opacity:1; transform:translateY(0)} }
  .alert-head{display:flex;align-items:center;gap:12px;font-weight:800;color:#92400e;margin-bottom:12px;font-size:1.1rem;text-transform:uppercase;letter-spacing:.5px}
  .alert-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #fde68a;font-size:.9rem;color:#92400e;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.04);flex-wrap:wrap;gap:10px;transition:all 0.3s ease}
  .alert-item:last-child{margin-bottom:0}
  
  /* Granular Dismiss Button for Alerts */
  .alert-x-btn {
    background: transparent;
    color: #9ca3af;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1.1rem;
  }
  .alert-x-btn:hover { background: #fee2e2; color: #ef4444; }

  /* Login Screen */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top left, #1e293b, #020617);padding:20px;position:relative;overflow:hidden}
  .login::before{content:'';position:absolute;width:600px;height:600px;background:var(--primary);filter:blur(150px);opacity:0.15;border-radius:50%;top:-200px;left:-200px}
  .login-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:24px;padding:45px;width:100%;max-width:480px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);position:relative;z-index:1}
  .login-logo{text-align:center;margin-bottom:35px}
  .login-logo h1{font-size:2.4rem;background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;letter-spacing:-1px}
  .login-logo p{color:var(--text-muted);font-size:.95rem;margin-top:8px;font-weight:500}
  .user-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px, 1fr));gap:15px;margin-bottom:25px}
  .user-btn{background:#f8fafc;border:2px solid transparent;border-radius:16px;padding:20px 10px;text-align:center;transition:all .3s ease;cursor:pointer;box-shadow:0 4px 6px rgba(0,0,0,.02)}
  .user-btn:hover{transform:translateY(-4px);box-shadow:0 12px 20px rgba(0,0,0,.06)}
  .user-btn.active{border-color:var(--primary);background:#ecfdf5;box-shadow:0 8px 25px rgba(16,185,129,.15)}
  .user-av{width:56px;height:56px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;box-shadow:0 4px 10px rgba(0,0,0,.1)}
  .user-nm{font-weight:800;font-size:.95rem;color:var(--text)}
  .user-rl{font-size:.7rem;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  #pinInput{width:100%;text-align:center;letter-spacing:16px;font-size:26px;padding:18px;border:2px solid var(--border);border-radius:14px;margin-bottom:20px;font-weight:800;background:#f8fafc;color:var(--text);transition:.3s}
  #pinInput:focus{background:#fff;border-color:var(--primary);box-shadow:0 0 0 4px rgba(16,185,129,.1)}
  .login-btn{width:100%;padding:16px;background:var(--primary-gradient);color:#fff;border-radius:14px;font-size:1.1rem;font-weight:800;letter-spacing:.5px;box-shadow:0 8px 20px rgba(16,185,129,.3);transition:.3s}
  .login-btn:hover{box-shadow:0 12px 25px rgba(16,185,129,.4);transform:translateY(-2px)}

  /* Form Elements & Modals */
  .form-group{margin-bottom:20px}
  .form-group label{display:block;margin-bottom:8px;font-size:.85rem;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.5px}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;background:#f8fafc;font-weight:500}
  .form-group textarea{min-height:90px;resize:vertical}
  
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .2s ease;overflow-y:auto}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border-radius:24px;padding:30px;width:100%;max-width:550px;box-shadow:0 25px 50px rgba(0,0,0,.25);animation:slideUp .3s ease;margin:auto}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;border-bottom:1px solid #f1f5f9;padding-bottom:16px}
  .modal-head h3{font-size:1.4rem;font-weight:800;color:var(--text)}
  .modal-close{background:#f1f5f9;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#64748b;transition:.2s}
  .modal-close:hover{background:#e2e8f0;color:#0f172a;transform:rotate(90deg)}
  .modal-btns{display:flex;gap:12px;justify-content:flex-end;margin-top:10px}

  /* Admin & Permissions */
  .profile-banner{display:flex;align-items:center;gap:24px;padding:35px;background:var(--primary-gradient);border-radius:20px;color:#fff;margin-bottom:30px;box-shadow:0 10px 25px rgba(16,185,129,.25);position:relative;overflow:hidden}
  .profile-banner::after{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);border-radius:50%;transform:translate(50%, -50%)}
  .profile-av{width:80px;height:80px;border-radius:50%;background:#fff;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:800;box-shadow:0 8px 16px rgba(0,0,0,.1)}
  
  .set-row{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid #f1f5f9;gap:15px}
  .set-row:last-of-type{border-bottom:none}
  .set-row .desc{font-size:.8rem;color:var(--text-muted);margin-top:6px;line-height:1.4}
  
  .toggle{position:relative;display:inline-block;width:54px;height:30px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#cbd5e1;transition:.3s;border-radius:30px;cursor:pointer}
  .slider:before{content:"";position:absolute;height:22px;width:22px;left:4px;bottom:4px;background:#fff;transition:.3s cubic-bezier(0.4, 0, 0.2, 1);border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,.2)}
  .toggle input:checked+.slider{background:var(--primary)}
  .toggle input:checked+.slider:before{transform:translateX(24px)}

  /* Custom Segments & Permissions Grid */
  .perm-grid{display:flex;flex-direction:column;gap:14px;margin-top:10px}
  .perm-row{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 2px 6px rgba(0,0,0,.02);transition:.2s;flex-wrap:wrap;gap:15px}
  .perm-row:hover{border-color:#cbd5e1;box-shadow:0 4px 12px rgba(0,0,0,.05)}
  .seg-toggle { display:inline-flex; background:#f1f5f9; border-radius:10px; padding:5px; gap:5px; align-items:center; flex-wrap:wrap; border:1px solid #e2e8f0}
  .seg-btn { border:none; background:transparent; padding:10px 18px; border-radius:8px; cursor:pointer; font-size:.85rem; font-weight:700; color:#64748b; transition:all .2s ease; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .seg-btn:hover { color:#0f172a }
  .seg-btn.active { background:#fff; color:var(--primary); box-shadow:0 2px 8px rgba(0,0,0,.08); }

  /* Misc */
  #syncBar{position:fixed;top:0;left:260px;right:0;text-align:center;font-size:12px;font-weight:700;padding:8px;background:var(--primary-gradient);color:#fff;z-index:90;letter-spacing:.5px;box-shadow:0 2px 10px rgba(16,185,129,.3)}
  .toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:16px 24px;border-radius:12px;box-shadow:0 15px 30px rgba(0,0,0,.2);z-index:2000;font-weight:600;display:flex;align-items:center;gap:12px;border:1px solid #1e293b;animation:slideUp .3s ease}
  .mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:101;background:#0f172a;color:#fff;padding:12px 14px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.15)}

  /* Mobile Responsive */
  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0;padding:15px;padding-top:70px}
    .topbar{
      position:relative; 
      top:0; 
      padding:16px; 
      margin-bottom:20px; 
      flex-direction:column; 
      align-items:flex-start; 
      gap:14px;
      background:var(--surface);
      border-radius:16px;
    }
    .topbar h2{font-size:1.25rem}
    .topbar-right{width:100%;justify-content:flex-start}
    .mobile-toggle{display:block}
    #syncBar{left:0}
    
    table, thead, tbody, th, td, tr { display: block; width: 100%; }
    thead tr { display: none; }
    tr { margin-bottom: 16px; background: #fff; border-radius: 16px; border: 1px solid var(--border); padding: 16px; box-shadow:0 4px 10px rgba(0,0,0,.02); }
    td { text-align: right; padding: 12px 0 12px 45%; position: relative; border-bottom: 1px solid #f1f5f9; min-height:44px; display:flex; justify-content:flex-end; align-items:center; flex-wrap:wrap; gap:10px}
    td:last-child { border-bottom: 0; }
    td::before { content: attr(data-label); position: absolute; left: 0; top:50%; transform:translateY(-50%); font-weight: 700; color: #64748b; font-size:.8rem; text-transform:uppercase; letter-spacing:.5px; text-align: left; width: 40%; }
    .badge { display:inline-block; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="login-card">
    <div class="login-logo">
      <h1><i class="fas fa-layer-group" style="font-size:2rem;margin-right:10px"></i>MoneyMatrix</h1>
      <p>Enterprise Edition</p>
    </div>
    <p class="login-q" style="text-transform:uppercase;font-weight:700;letter-spacing:1px;font-size:.8rem;margin-bottom:20px">Select Your Profile</p>
    <div class="user-grid" id="userGrid"></div>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
    <button class="login-btn" id="loginBtn">Unlock Workspace <i class="fas fa-arrow-right" style="margin-left:8px"></i></button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appShell" class="hidden">
  <button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
  <div class="sidebar">
    <div class="sidebar-brand">
      <h1><i class="fas fa-layer-group"></i> MoneyMatrix</h1>
      <p id="welcomeLine">Workspace Ready</p>
    </div>
    <div id="navList"></div>
  </div>

  <div class="main">
    <div id="syncBar">Establishing Secure Connection…</div>
    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <div class="topbar-right">
        <span class="pill pill-blue" id="modePill">Shared</span>
        <span class="pill pill-purple" id="rolePill">Admin</span>
        <span id="userName" style="font-weight:800;background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1rem">Admin</span>
      </div>
    </div>
    <div id="pageBody"></div>
  </div>
</div>

<div id="modalRoot"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDNs_JNwPrB7vcw1OfMUS8kkOYxYaQ45YE",
  authDomain: "money-metrix-9f1da.firebaseapp.com",
  projectId: "money-metrix-9f1da",
  storageBucket: "money-metrix-9f1da.firebasestorage.app",
  messagingSenderId: "384847998438",
  appId: "1:384847998438:web:2dca6550d379dc5f25fa27"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC = doc(db, "moneymatrix", "appData");
let writeTimer=null, applyingRemote=false;
function cloudSave(){ if(applyingRemote) return; clearTimeout(writeTimer); writeTimer=setTimeout(()=>{ setDoc(DOC,{json:JSON.stringify(DB)}).catch(e=>setSync("Save error",true)); },400); }

/* ===== Data model ===== */
const STORE="mm_v2"; 
let DB = {
  users:[
    {id:"admin",username:"admin",pin:"8888",role:"admin"},
    {id:"dad",username:"dad",pin:"2619",role:"user"},
    {id:"mom",username:"mom",pin:"2619",role:"user"}
  ],
  profiles:{
    admin:{displayName:"Admin",phone:"",email:"",bio:"",theme:"light",dateFormat:"UK"},
    dad:{displayName:"Dad",phone:"",email:"",bio:"",theme:"light",dateFormat:"UK"},
    mom:{displayName:"Mom",phone:"",email:"",bio:"",theme:"light",dateFormat:"UK"}
  },
  settings:{appName:"MoneyMatrix",currency:"₹",dataSharing:true},
  permissions:{},
  shared:{transactions:[],members:[],gifts:[],coaches:[],supervisors:[]},
  perUser:{}
};

let currentUser=null, viewingAs=null, activePage="dashboard";

// True real-time granular session memory array
let dismissedAlertsArray = JSON.parse(sessionStorage.getItem("mm_dismissed_alerts") || "[]");

/* ===== Helpers ===== */
const $=id=>document.getElementById(id);
const cur=()=>DB.settings.currency||"₹";
const money=n=>cur()+Number(n||0).toLocaleString("en-IN");
const nid=()=>"id_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const COLORS={bos_rajkot:"#f43f5e",admin:"#10b981",dad:"#3b82f6",mom:"#8b5cf6"};

function fmtDate(d){ if(!d) return"-"; const x=new Date(d); const f=DB.profiles[currentUser?.id]?.dateFormat||"UK";
  const dd=String(x.getDate()).padStart(2,"0"),mm=String(x.getMonth()+1).padStart(2,"0"),yy=x.getFullYear();
  if(f==="US")return`${mm}/${dd}/${yy}`; if(f==="ISO")return`${yy}-${mm}-${dd}`; return`${dd}/${mm}/${yy}`; }
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.innerHTML=`<i class="fas fa-check-circle" style="color:var(--primary);font-size:1.2rem"></i> `+m; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function setSync(txt,err){ const b=$("syncBar"); if(!b)return; b.textContent=txt; b.style.background=err?"#ef4444":"var(--primary-gradient)"; if(!err&&txt==="✓ Data Synchronized") setTimeout(()=>b.classList.add("hidden"),1500); else b.classList.remove("hidden"); }

/* Permissions Engine */
function isSuperAdmin(){ return currentUser?.role==="superadmin"; }
function isAdmin(){ return currentUser?.role==="admin" || currentUser?.role==="superadmin"; }

function getPerm(section) {
  if (isSuperAdmin()) return 'write'; 
  const role = currentUser?.role || 'user';
  if (!DB.permissions || !DB.permissions[role]) return role === 'admin' ? 'write' : 'view';
  return DB.permissions[role][section] || 'hidden';
}
function canView(section) { const p = getPerm(section); return p === 'view' || p === 'write'; }
function canWrite(section) { return getPerm(section) === 'write'; }

function data(){
  if(DB.settings.dataSharing) return DB.shared;
  const uid=viewingAs||currentUser?.id;
  if(!DB.perUser[uid]) DB.perUser[uid]={transactions:[],members:[],gifts:[],coaches:[],supervisors:[]};
  return DB.perUser[uid];
}
function save(){ localStorage.setItem(STORE,JSON.stringify(DB)); cloudSave(); }

/* ===== Boot ===== */
function load(){ 
  try { const s=localStorage.getItem(STORE); if(s) DB={...DB,...JSON.parse(s)}; } catch(e){} 
  ensure(); 
}
function ensure(){
  if (!DB.users.some(u => u.role === 'superadmin')) {
    DB.users.unshift({id:"bos_rajkot",username:"bos_rajkot",pin:"9999",role:"superadmin"});
    if (!DB.profiles["bos_rajkot"]) DB.profiles["bos_rajkot"] = {displayName:"BOS RAJKOT",phone:"",email:"",bio:"",theme:"light",dateFormat:"UK"};
    if (!DB.perUser["bos_rajkot"]) DB.perUser["bos_rajkot"] = {transactions:[],members:[],gifts:[],coaches:[],supervisors:[]};
  }
  if (!DB.permissions || Object.keys(DB.permissions).length === 0 || !DB.permissions.superadmin) {
    DB.permissions = {
      superadmin: { dashboard:"write", marathon:"write", club:"write", coaches:"write", supervisors:"write", gifts:"write", backup:"write" },
      admin: { dashboard:"write", marathon:"write", club:"write", coaches:"write", supervisors:"write", gifts:"write", backup:"write" },
      user: { dashboard:"view", marathon:"view", club:"view", coaches:"view", supervisors:"view", gifts:"view", backup:"hidden" }
    };
  }
  DB.users.forEach(u=>{
    if(!DB.profiles[u.id]) DB.profiles[u.id]={displayName:u.username,phone:"",email:"",bio:"",theme:"light",dateFormat:"UK"};
    if(!DB.perUser[u.id]) DB.perUser[u.id]={transactions:[],members:[],gifts:[],coaches:[],supervisors:[]};
    else {
      if(!DB.perUser[u.id].coaches) DB.perUser[u.id].coaches=[];
      if(!DB.perUser[u.id].supervisors) DB.perUser[u.id].supervisors=[];
    }
  });
  if(!DB.shared) DB.shared={transactions:[],members:[],gifts:[],coaches:[],supervisors:[]};
  else {
    if(!DB.shared.coaches) DB.shared.coaches=[];
    if(!DB.shared.supervisors) DB.shared.supervisors=[];
  }
  save();
}
function startCloud(){
  onSnapshot(DOC, snap=>{
    setSync("✓ Data Synchronized");
    if(snap.exists()&&snap.data().json){ try{ applyingRemote=true; DB={...DB,...JSON.parse(snap.data().json)}; ensure(); localStorage.setItem(STORE,JSON.stringify(DB)); applyingRemote=false; if(currentUser) render(); }catch(e){} }
    else { setSync("✓ Data Synchronized"); cloudSave(); }
  }, e=>setSync("Sync error — check network",true));
}

/* ===== Login ===== */
let selUser=null;
function buildLogin(){
  $("userGrid").innerHTML=DB.users.map(u=>`
    <div class="user-btn" data-id="${u.id}" onclick="pickUser('${u.id}')">
      <div class="user-av" style="background:${COLORS[u.id]||'linear-gradient(135deg, #64748b, #475569)'}">${(DB.profiles[u.id]?.displayName||u.username)[0].toUpperCase()}</div>
      <div class="user-nm">${esc(DB.profiles[u.id]?.displayName||u.username)}</div>
      <div class="user-rl">${u.role === 'superadmin' ? 'Super Admin' : u.role}</div>
    </div>`).join("");
}
window.pickUser=id=>{ selUser=DB.users.find(u=>u.id===id); document.querySelectorAll(".user-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===id)); $("pinInput").focus(); };
function doLogin(){
  const err=$("loginErr"), pin=$("pinInput").value.trim();
  if(!selUser){ err.textContent="Please select a profile."; return; }
  if(pin!==selUser.pin){ err.textContent="Incorrect PIN code."; $("pinInput").value=""; return; }
  currentUser=selUser; viewingAs=currentUser.id;
  sessionStorage.setItem("mm_session",currentUser.id);
  $("loginPage").classList.add("hidden"); $("appShell").classList.remove("hidden");
  buildNav(); render();
}
$("loginBtn").onclick=doLogin;
$("pinInput").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });

/* ===== Navigation ===== */
const NAV=[
  {id:"dashboard",label:"Dashboard",icon:"fa-chart-pie", req:"dashboard"},
  {id:"marathon",label:"Marathon Payments",icon:"fa-running", req:"marathon"},
  {id:"club",label:"Club Membership",icon:"fa-users", req:"club"},
  {id:"coaches",label:"Club Coaches",icon:"fa-user-tie", req:"coaches"},
  {id:"supervisors",label:"Supervisors",icon:"fa-user-shield", req:"supervisors"},
  {id:"gifts",label:"Gifts & Rewards",icon:"fa-gift", req:"gifts"},
  {id:"backup",label:"Data Management",icon:"fa-database", req:"backup"},
  {divider:true},
  {id:"admin",label:"User Management",icon:"fa-users-cog", adminOnly:true},
  {id:"permissions",label:"Access Control",icon:"fa-user-lock", superAdminOnly:true},
  {divider:true},
  {id:"profile",label:"My Profile",icon:"fa-user-circle", always:true},
  {id:"settings",label:"Settings",icon:"fa-sliders-h", always:true},
  {id:"logout",label:"Logout",icon:"fa-sign-out-alt", always:true}
];
function buildNav(){
  $("navList").innerHTML=NAV.map(n=>{
    if(n.divider) return `<div class="nav-divider"></div>`;
    if(n.superAdminOnly && !isSuperAdmin()) return "";
    if(n.adminOnly && !isAdmin()) return "";
    if(n.req && !canView(n.req)) return ""; 
    return `<div class="nav-item${n.id===activePage?' active':''}" data-tab="${n.id}" onclick="go('${n.id}')"><i class="fas ${n.icon}"></i>${n.label}</div>`;
  }).join("");
}
window.go=id=>{
  if(id==="logout"){ 
    sessionStorage.removeItem("mm_session"); 
    sessionStorage.removeItem("mm_dismissed_alerts"); 
    location.reload(); 
    return; 
  }
  activePage=id; buildNav();
  if(window.innerWidth<=900) document.querySelector(".sidebar").classList.remove("open");
  render();
};

/* viewing-as switcher */
function switcher(){
  if(!isAdmin()||DB.settings.dataSharing) return "";
  return `<div class="switcher"><span class="lbl">Viewing Context:</span>`+
    DB.users.map(u=>`<button class="chip${(viewingAs||currentUser.id)===u.id?' active':''}" onclick="setView('${u.id}')">${esc(DB.profiles[u.id]?.displayName||u.username)}</button>`).join("")+`</div>`;
}
window.setView=id=>{ viewingAs=id; render(); };

/* ===== Top bar ===== */
function topbar(title){
  $("pageTitle").textContent=title;
  $("welcomeLine").textContent="Welcome back,";
  $("userName").textContent=DB.profiles[currentUser.id]?.displayName||currentUser.username;
  $("rolePill").textContent = isSuperAdmin() ? "Super Admin" : (isAdmin() ? "Admin" : "User");
  const mp=$("modePill"); 
  mp.textContent=DB.settings.dataSharing?"Shared Data":"Isolated Data"; 
  mp.className="pill "+(DB.settings.dataSharing?"pill-blue":"pill-purple");
}

/* ===== Router ===== */
function render(){
  if(NAV.find(n=>n.id===activePage)?.req && !canView(activePage)) activePage = "dashboard";
  if(activePage==="admin" && !isAdmin()) activePage="dashboard";
  if(activePage==="permissions" && !isSuperAdmin()) activePage="dashboard";

  const map={dashboard:renderDash,marathon:renderMarathon,club:renderClub,coaches:renderCoaches,supervisors:renderSupervisors,gifts:renderGifts,backup:renderBackup,admin:renderAdmin,permissions:renderPermissions,profile:renderProfile,settings:renderSettings};
  const titles={dashboard:"Dashboard Overview",marathon:"Marathon Payments",club:"Club Membership",coaches:"Club Coaches",supervisors:"Supervisors",gifts:"Gifts & Rewards",backup:"Data Management",admin:"User Management",permissions:"Access Control Manager",profile:"My Profile",settings:"Account Settings"};
  topbar(titles[activePage]||"Dashboard");
  (map[activePage]||renderDash)();
}

window.openWhatsApp = (phone, msg) => {
  if(!phone || phone.trim() === "-" || phone.trim() === "") { toast("No phone number saved for this user."); return; }
  let p = phone.replace(/[^0-9]/g, '');
  if(p.length === 10) p = "91" + p; 
  window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, '_blank');
};

/* ===== Granular Alert Dismissal Logic ===== */
window.dismissSingleAlert = (alertId) => {
  dismissedAlertsArray.push(alertId);
  sessionStorage.setItem("mm_dismissed_alerts", JSON.stringify(dismissedAlertsArray));
  
  const el = document.getElementById("alert-" + alertId);
  if(el) {
    el.style.opacity = "0";
    el.style.transform = "translateX(20px)";
    setTimeout(() => { renderDash(); }, 300); 
  } else {
    renderDash();
  }
};

/* ===== Dashboard & Action Center ===== */
function renderDash(){
  const d=data();
  let alertsHtml = "";
  if (isSuperAdmin()) {
    const now = new Date().getTime();
    
    let firstKitDue = d.members.filter(m => m.firstKit==='pending' && (now - new Date(m.joinDate).getTime()) > 5 * 86400000);
    let secondKitDue = d.members.filter(m => m.firstKit==='completed' && m.secondKit==='pending');
    
    firstKitDue = firstKitDue.filter(m => !dismissedAlertsArray.includes(m.id + "_k1"));
    secondKitDue = secondKitDue.filter(m => !dismissedAlertsArray.includes(m.id + "_k2"));
    
    if (firstKitDue.length > 0 || secondKitDue.length > 0) {
      alertsHtml = `<div class="alert-box">
        <div class="alert-head"><i class="fas fa-bell"></i> Action Center Required</div>`;
      
      firstKitDue.forEach(m => {
        const days = Math.floor((now - new Date(m.joinDate).getTime()) / 86400000);
        const msg = `Hi ${m.name}, this is a gentle reminder that your 1st Kit is due. Let us know when you're ready!`;
        alertsHtml += `<div class="alert-item" id="alert-${m.id}_k1">
          <span><i class="fas fa-exclamation-circle" style="margin-right:6px;color:#f59e0b"></i> <b>${esc(m.name)}</b>'s First Kit is pending (${days} days ago)</span> 
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-sm btn-amber" onclick="go('club')">Resolve</button>
            <button class="btn btn-sm btn-whatsapp" onclick="openWhatsApp('${esc(m.phone||'')}', '${msg}')"><i class="fab fa-whatsapp"></i></button>
            <button class="alert-x-btn" onclick="dismissSingleAlert('${m.id}_k1')" title="Dismiss"><i class="fas fa-times"></i></button>
          </div>
        </div>`;
      });
      
      secondKitDue.forEach(m => {
        const msg = `Hi ${m.name}, great job completing your 1st Kit! This is a reminder for your 2nd Kit. Keep up the momentum!`;
        alertsHtml += `<div class="alert-item" id="alert-${m.id}_k2">
          <span><i class="fas fa-check-circle" style="margin-right:6px;color:#f59e0b"></i> <b>${esc(m.name)}</b> finished 1st Kit. 2nd Kit due!</span> 
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-sm btn-amber" onclick="go('club')">Resolve</button>
            <button class="btn btn-sm btn-whatsapp" onclick="openWhatsApp('${esc(m.phone||'')}', '${msg}')"><i class="fab fa-whatsapp"></i></button>
            <button class="alert-x-btn" onclick="dismissSingleAlert('${m.id}_k2')" title="Dismiss"><i class="fas fa-times"></i></button>
          </div>
        </div>`;
      });
      alertsHtml += `</div>`;
    }
  }

  const rec = d.transactions.filter(t=>t.status==="completed" && t.type!=="sent").reduce((s,t)=>s+ +t.amount,0);
  const sent = d.transactions.filter(t=>t.status==="completed" && t.type==="sent").reduce((s,t)=>s+ +t.amount,0);
  const totalRev = rec - sent;

  $("pageBody").innerHTML = alertsHtml + switcher() + `
    <div class="stats">
      <div class="stat"><div class="stat-ic ic-green"><i class="fas fa-wallet"></i></div><div class="stat-info"><div class="stat-val">${money(totalRev)}</div><div class="stat-lbl">Net Marathon Flow</div></div></div>
      <div class="stat"><div class="stat-ic ic-blue"><i class="fas fa-running"></i></div><div class="stat-info"><div class="stat-val">${d.transactions.length}</div><div class="stat-lbl">Total Marathon Logs</div></div></div>
      <div class="stat"><div class="stat-ic ic-purple"><i class="fas fa-users"></i></div><div class="stat-info"><div class="stat-val">${d.members.length}</div><div class="stat-lbl">Active Club Members</div></div></div>
      <div class="stat"><div class="stat-ic ic-red"><i class="fas fa-gift"></i></div><div class="stat-info"><div class="stat-val">${d.gifts.length}</div><div class="stat-lbl">Rewards Distributed</div></div></div>
    </div>`;
}

/* ===== Marathon Payments ===== */
let maraSearch="",marathonFilter="all";
window.setMaraSearch=v=>{ maraSearch=v.toLowerCase(); renderMarathon(); };
window.setMaraFilter=v=>{ marathonFilter=v; renderMarathon(); };
function renderMarathon(){
  const d=data();
  let rows=[...d.transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(marathonFilter!=="all") rows=rows.filter(t=>t.type===marathonFilter || (!t.type && marathonFilter==='received'));
  if(maraSearch) rows=rows.filter(t=>(t.customer||"").toLowerCase().includes(maraSearch)||(t.product||"").toLowerCase().includes(maraSearch));
  
  const writeBtn = canWrite('marathon') ? `<button class="btn btn-primary" onclick="txModal()"><i class="fas fa-plus"></i> Log Payment</button>` : '';

  $("pageBody").innerHTML=switcher()+`
    <div class="card">
      <div class="card-head"><span class="card-title">Transaction History</span>${writeBtn}</div>
      <div class="filter-row">
        <input class="search" placeholder="Search records..." value="${esc(maraSearch)}" oninput="setMaraSearch(this.value)">
        <select onchange="setMaraFilter(this.value)">
          <option value="all"${marathonFilter==='all'?' selected':''}>All Types</option>
          <option value="received"${marathonFilter==='received'?' selected':''}>Received (Credit)</option>
          <option value="sent"${marathonFilter==='sent'?' selected':''}>Sent (Debit)</option>
        </select>
      </div>
      <div class="tbl-wrap">${ rows.length?
        `<table><thead><tr><th>Date</th><th>Customer</th><th>Product/Note</th><th>Type</th><th>Amount</th><th>Status</th>${canWrite('marathon')?'<th>Actions</th>':''}</tr></thead><tbody>`+
        rows.map(t=>`<tr>
          <td data-label="Date">${fmtDate(t.date)}</td>
          <td data-label="Customer" style="font-weight:700;color:var(--text)">${esc(t.customer)}</td>
          <td data-label="Details">${esc(t.product||"")}${t.notes?`<div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">${esc(t.notes)}</div>`:""}</td>
          <td data-label="Type"><span class="badge ${t.type==='sent'?'bg-red':'bg-green'}">${t.type==='sent'?'Sent (Debit)':'Received (Credit)'}</span></td>
          <td data-label="Amount" style="font-weight:800;font-size:1.05rem;color:${t.type==='sent'?'#dc2626':'#059669'}">${t.type==='sent'?'-':'+'}${money(t.amount)}</td>
          <td data-label="Status"><span class="badge ${t.status==='completed'?'bg-gray':'bg-amber'}">${t.status}</span></td>
          ${canWrite('marathon')?`<td data-label="Actions"><button class="btn btn-sm btn-gray" onclick='txModal(${JSON.stringify(t)})'><i class="fas fa-pen"></i></button> <button class="btn btn-sm btn-red" onclick="delItem('transactions','${t.id}')"><i class="fas fa-trash"></i></button></td>`:''}
        </tr>`).join("")+`</tbody></table>`
        : `<div class="empty"><i class="fas fa-running"></i>No marathon payments logged</div>`}</div>
    </div>`;
}
window.txModal=(t={})=>showModal(`
  <div class="modal-head"><h3>${t.id?"Edit":"Log"} Marathon Payment</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
  <div class="form-group"><label>Customer Name</label><input id="f_cust" value="${esc(t.customer||"")}"></div>
  <div class="form-group"><label>Product / Description</label><input id="f_prod" value="${esc(t.product||"")}"></div>
  <div class="form-group"><label>Payment Type</label><select id="f_type"><option value="received"${t.type!=='sent'?' selected':''}>Received (Credit)</option><option value="sent"${t.type==='sent'?' selected':''}>Sent (Debit)</option></select></div>
  <div class="form-group"><label>Amount</label><input id="f_amt" type="number" inputmode="numeric" value="${t.amount||""}"></div>
  <div class="form-group"><label>Status</label><select id="f_stat"><option value="completed"${t.status==='completed'?' selected':''}>Completed</option><option value="pending"${t.status==='pending'?' selected':''}>Pending</option></select></div>
  <div class="form-group"><label>Notes</label><textarea id="f_notes">${esc(t.notes||"")}</textarea></div>
  <div class="modal-btns"><button class="btn btn-gray" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick='saveTx("${t.id||""}","${t.date||""}")'>Save Record</button></div>`);
window.saveTx=(id,date)=>{

        ${canWrite('backup')?`<div class="stat" style="flex-direction:column;text-align:center;padding:35px 20px"><div class="stat-ic ic-blue" style="margin:0 auto 16px"><i class="fas fa-file-upload"></i></div><div style="font-weight:800;font-size:1.1rem;margin-bottom:8px">System Restore</div><p style="font-size:.85rem;color:var(--text-muted);margin-bottom:20px;line-height:1.4">Merge an older JSON backup into the current live database.</p><input type="file" id="impFile" accept=".json" class="hidden" onchange="importJSON(event)"><button class="btn btn-blue" style="width:100%" onclick="document.getElementById('impFile').click()">Import JSON File</button></div>`:''}
        <div class="stat" style="flex-direction:column;text-align:center;padding:35px 20px"><div class="stat-ic ic-amber" style="margin:0 auto 16px"><i class="fas fa-file-csv"></i></div><div style="font-weight:800;font-size:1.1rem;margin-bottom:8px">Financial Report</div><p style="font-size:.85rem;color:var(--text-muted);margin-bottom:20px;line-height:1.4">Export your Marathon payments as a spreadsheet format.</p><button class="btn btn-amber" style="width:100%" onclick="exportCSV()">Export CSV File</button></div>
      </div>
    </div>`;
}
window.exportJSON=()=>{ dl(JSON.stringify({exportedAt:new Date().toISOString(),...DB},null,2),"moneymatrix_backup_"+new Date().toISOString().slice(0,10)+".json","application/json"); };
window.exportCSV=()=>{ const d=data(); const rows=[["Date","Customer","Product","Type","Amount","Status","Notes"],...d.transactions.map(t=>[fmtDate(t.date),t.customer,t.product||"",t.type||"received",t.amount,t.status,(t.notes||"").replace(/[\n,]/g," ")])]; dl(rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n"),"transactions.csv","text/csv"); };
function dl(content,name,type){ const b=new Blob([content],{type}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=name; a.click(); }
window.importJSON=e=>{
  const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{
    const j=JSON.parse(r.result); const sd=j.sharedData||j.shared||j;
    if(!confirm("Warning: This will merge the imported data into your current view. Do you wish to continue?")) return;
    const d=data();
    ["transactions","members","gifts","coaches","supervisors"].forEach(c=>{ 
      if(!d[c]) d[c] = [];
      (sd[c]||[]).forEach(item=>{ const id=item.id||nid(); if(!d[c].some(x=>x.id===id)) d[c].push({...item,id}); }); 
    });
    save(); render(); toast("Data Import Successful");
  }catch(err){ toast("Import failed: "+err.message); } };
  r.readAsText(f);
};

/* ===== Dedicated Permissions Page ===== */

let permSearchText = "";
window.setPermRole = v => { permSelectedRole = v; renderPermissions(); };
window.setPermSearch = v => { permSearchText = v.toLowerCase(); renderPermissions(); };

             <option value="admin" ${permSelectedRole==='admin'?'selected':''}>Admin Privileges</option>

        <div style="flex:2;min-width:250px;position:relative">

              <div><div style="font-weight:800;color:var(--text);font-size:1.1rem">${s.name}</div><div style="font-size:.85rem;color:var(--text-muted);margin-top:4px;font-weight:500">${s.desc}</div></div>

/* ===== Admin Panel (Users & Settings) ===== */
function renderAdmin(){
  const totalRev=Object.values(DB.settings.dataSharing?{s:DB.shared}:DB.perUser).reduce((s,u)=>s+u.transactions.filter(t=>t.status==="completed" && t.type!=="sent").reduce((a,t)=>a+ +t.amount,0),0);
  const totalTx=DB.settings.dataSharing?DB.shared.transactions.length:Object.values(DB.perUser).reduce((s,u)=>s+u.transactions.length,0);
  const sizeKB=Math.max(1,Math.round(JSON.stringify(DB).length/1024));
  
  $("pageBody").innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-ic ic-purple"><i class="fas fa-users"></i></div><div class="stat-info"><div class="stat-val">${DB.users.length}</div><div class="stat-lbl">Registered Accounts</div></div></div>
      <div class="stat"><div class="stat-ic ic-green"><i class="fas fa-dollar-sign"></i></div><div class="stat-info"><div class="stat-val">${money(totalRev)}</div><div class="stat-lbl">Aggregate Revenue</div></div></div>
      <div class="stat"><div class="stat-ic ic-blue"><i class="fas fa-running"></i></div><div class="stat-info"><div class="stat-val">${totalTx}</div><div class="stat-lbl">Total Ledger Entries</div></div></div>
      <div class="stat"><div class="stat-ic ic-amber"><i class="fas fa-server"></i></div><div class="stat-info"><div class="stat-val">${sizeKB} KB</div><div class="stat-lbl">Storage Footprint</div></div></div>
    </div>
    
    <div class="card"><div class="card-head"><span class="card-title">User Accounts Directory</span><button class="btn btn-primary" onclick="userModal()"><i class="fas fa-user-plus"></i> Add Account</button></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px">
      ${DB.users.map(u=>{ 
        let actionBtns = '';
        if (isSuperAdmin() || (isAdmin() && (u.role === 'user' || u.id === currentUser.id))) {
          actionBtns += `<button class="btn btn-sm btn-gray" onclick="userModal('${u.id}')" title="Edit"><i class="fas fa-cog"></i></button>`;
        }
        if (u.id !== currentUser.id) {
          if (isSuperAdmin() && u.role !== 'superadmin') {
            if (u.role === 'user') actionBtns += `<button class="btn btn-sm btn-blue" onclick="makeAdmin('${u.id}')" title="Promote to Admin"><i class="fas fa-arrow-up"></i></button>`;
            actionBtns += `<button class="btn btn-sm btn-red" onclick="delUser('${u.id}')" title="Delete User"><i class="fas fa-trash"></i></button>`;
          } else if (isAdmin() && !isSuperAdmin() && u.role === 'user') {
            actionBtns += `<button class="btn btn-sm btn-blue" onclick="makeAdmin('${u.id}')"><i class="fas fa-arrow-up"></i></button>`;
            actionBtns += `<button class="btn btn-sm btn-red" onclick="delUser('${u.id}')"><i class="fas fa-trash"></i></button>`;
          }
        }
        const displayPin = (u.role === 'superadmin' && !isSuperAdmin()) ? '••••' : esc(u.pin);

        return `<div style="padding:20px; border-radius:16px; border:2px solid ${u.id===currentUser.id?'var(--primary)':'var(--border)'}; background:#fff; box-shadow:0 4px 10px rgba(0,0,0,0.02)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="display:flex;align-items:center;gap:14px">
              <div class="user-av" style="background:${COLORS[u.id]||'linear-gradient(135deg, #64748b, #475569)'};width:50px;height:50px;font-size:1.2rem;margin:0">${(DB.profiles[u.id]?.displayName||u.username)[0].toUpperCase()}</div>
              <div>
                <div style="font-weight:800;font-size:1.1rem">${esc(DB.profiles[u.id]?.displayName||u.username)}</div>
                <div style="font-size:.8rem;color:var(--text-muted);font-weight:600;margin-top:4px;font-family:monospace">@${esc(u.username)} · PIN: ${displayPin}</div>
              </div>
            </div>
          </div>
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
             <span class="badge ${u.role==='superadmin'?'bg-red':u.role==='admin'?'bg-green':'bg-gray'}">${u.role === 'superadmin' ? 'Super Admin' : u.role}</span>
             <div style="display:flex;gap:8px">${actionBtns}</div>
          </div>
        </div>`; }).join("")}
      </div>
    </div>
    
    <div class="card"><div class="card-head"><span class="card-title">System Configuration</span></div>
      <div class="set-row"><div><div style="font-weight:700">Data Architecture Model</div><div class="desc">Toggle between a unified family ledger (Shared) or isolated per-user databases.</div></div>
        <label class="toggle"><input type="checkbox" id="shareToggle" ${DB.settings.dataSharing?"checked":""} onchange="toggleShare()"><span class="slider"></span></label></div>
      <div class="set-row"><div><div style="font-weight:700">Application Title</div><div class="desc">Branding displayed on the authentication screen and main navigation header.</div></div><input id="setName" style="width:240px" value="${esc(DB.settings.appName)}"></div>
      <div class="set-row"><div><div style="font-weight:700">Default Currency Matrix</div><div class="desc">The base currency unit used for all financial calculations and displays.</div></div>
        <select id="setCur" style="width:140px"><option value="₹"${cur()==='₹'?' selected':''}>₹ INR</option><option value="$"${cur()==='$'?' selected':''}>$ USD</option><option value="€"${cur()==='€'?' selected':''}>€ EUR</option><option value="£"${cur()==='£'?' selected':''}>£ GBP</option></select></div>
      <div style="margin-top:24px;display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="saveAdminSettings()"><i class="fas fa-check-circle"></i> Commit Configuration</button></div>
    </div>`;
}
window.toggleShare=()=>{ DB.settings.dataSharing=$("shareToggle").checked; save(); render(); toast("Data architecture updated"); };
window.saveAdminSettings=()=>{ DB.settings.appName=$("setName").value.trim()||"MoneyMatrix"; DB.settings.currency=$("setCur").value; save(); render(); toast("System parameters saved"); };
window.makeAdmin=id=>{ 
  if(!isSuperAdmin() && !isAdmin()) return;
  if(!confirm("Elevate this user to Administrator status?"))return; 
  const u=DB.users.find(x=>x.id===id); if(u)u.role="admin"; save(); render(); toast("Account privileges elevated"); 
};
window.delUser=id=>{ 
  if(id===currentUser.id){toast("Operation blocked: Cannot delete active session");return;} 
  const target = DB.users.find(u=>u.id===id);
  if (target.role === 'superadmin') { toast("Operation blocked: Super Admin is protected"); return; }
  if (target.role === 'admin' && !isSuperAdmin()) { toast("Insufficient clearance to delete Admin"); return; }
  if(!confirm("Warning: Purging this account will permanently destroy their isolated data. Proceed?"))return; 
  
  DB.users=DB.users.filter(u=>u.id!==id); 
  delete DB.profiles[id]; delete DB.perUser[id]; 
  save(); render(); toast("Account successfully purged"); 
};

window.userModal=(id)=>{ 
  const u=id?DB.users.find(x=>x.id===id):null; const p=id?DB.profiles[id]:{};
  if (u && u.id !== currentUser.id && !isSuperAdmin() && u.role !== 'user') { toast("Insufficient clearance for this action."); return; }

  let roleOptions = `<option value="user"${u&&u.role==='user'?' selected':''}>Standard User</option><option value="admin"${u&&u.role==='admin'?' selected':''}>Administrator</option>`;
  if (isSuperAdmin()) roleOptions += `<option value="superadmin"${u&&u.role==='superadmin'?' selected':''}>Super Administrator</option>`;

  showModal(`<div class="modal-head"><h3>${u?"Modify Configuration":"Provision Account"}</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
    <div class="form-group"><label>Display Alias</label><input id="u_name" value="${esc(p.displayName||"")}"></div>
    <div class="form-group"><label>System ID (Username)</label><input id="u_user" value="${esc(u?u.username:"")}" ${u && !isSuperAdmin() ? "disabled":""}></div>
    <div class="form-group"><label>Access Code (PIN)</label><input id="u_pin" inputmode="numeric" value="${esc(u?u.pin:"")}"></div>
    <div class="form-group"><label>Security Level</label><select id="u_role" ${!isSuperAdmin() && u && u.id===currentUser.id ? "disabled" : ""}>${roleOptions}</select></div>
    <div class="modal-btns"><button class="btn btn-gray" onclick="closeModal()">Abort</button><button class="btn btn-primary" onclick='saveUser("${id||""}")'>Execute Provision</button></div>`);
};
window.saveUser=id=>{
  const name=$("u_name").value.trim(), pin=$("u_pin").value.trim();
  const usernameField = $("u_user").value.trim().toLowerCase();
  let role = $("u_role") ? $("u_role").value : 'user';

  if(pin.length<4){ toast("Access Code must be 4+ digits"); return; }
  if(id){ 
    const u=DB.users.find(x=>x.id===id); 
    if (u.id !== currentUser.id && !isSuperAdmin() && u.role !== 'user') { toast("Clearance check failed"); return; }
    if (!isSuperAdmin() && u.id === currentUser.id) role = u.role; 
    
    if (isSuperAdmin() && usernameField) {
        if(DB.users.some(x=>x.username===usernameField && x.id!==id)){ toast("System ID conflict detected"); return; }
        u.username = usernameField;
    }
    u.pin=pin; u.role=role; DB.profiles[id].displayName=name||u.username; 
  } else { 
    if(!usernameField){toast("System ID is required");return;} 
    if(DB.users.some(u=>u.username===usernameField)){toast("System ID conflict detected");return;}
    const newU={id:usernameField,username:usernameField,pin,role}; 
    DB.users.push(newU); 
    DB.profiles[usernameField]={displayName:name||usernameField,phone:"",email:"",bio:"",theme:"light",dateFormat:"UK"}; 
    DB.perUser[usernameField]={transactions:[],members:[],gifts:[],coaches:[],supervisors:[]}; 
  }
  save(); closeModal(); render(); toast("Configuration applied");
};

/* ===== Profile ===== */

window.saveProfile=()=>{ const p=DB.profiles[currentUser.id]; p.displayName=$("p_name").value.trim()||currentUser.username; p.phone=$("p_phone").value.trim(); p.email=$("p_email").value.trim(); p.bio=$("p_bio").value.trim(); save(); render(); toast("Identity matrix updated"); };
window.savePrefs=()=>{ DB.profiles[currentUser.id].dateFormat=$("p_date").value; save(); render(); toast("Interface standards applied"); };

/* ===== Settings ===== */
function renderSettings(){
  $("pageBody").innerHTML=`
    <div class="card" style="max-width:600px;margin:0 auto"><div class="card-head"><span class="card-title"><i class="fas fa-key" style="color:var(--primary);margin-right:10px"></i> Authentication Security</span></div>
      <div class="form-group"><label>Current Access Code</label><input id="s_cur" inputmode="numeric" type="password"></div>
      <div class="form-group"><label>New Access Code (4-6 Digits)</label><input id="s_new" inputmode="numeric" type="password"></div>
      <div class="form-group"><label>Verify New Access Code</label><input id="s_conf" inputmode="numeric" type="password"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="changePin()">Update Security Code</button>
    </div>`;
}
window.changePin=()=>{
  const c=$("s_cur").value.trim(),n=$("s_new").value.trim(),cf=$("s_conf").value.trim();
  if(c!==currentUser.pin){ toast("Current security code invalid"); return; }
  if(n.length<4){ toast("Security code requires 4+ digits"); return; }
  if(n!==cf){ toast("Verification mismatch"); return; }
  DB.users.find(u=>u.id===currentUser.id).pin=n; currentUser.pin=n; save(); render(); toast("Security code updated successfully");
};

/* ===== Modal plumbing ===== */
function showModal(html){ $("modalRoot").innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
window.closeModal=()=>{ $("modalRoot").innerHTML=""; };

/* ===== Start ===== */
load(); buildLogin(); startCloud();
const sess=sessionStorage.getItem("mm_session");
if(sess){ const u=DB.users.find(x=>x.id===sess); if(u){ currentUser=u; viewingAs=u.id; $("loginPage").classList.add("hidden"); $("appShell").classList.remove("hidden"); buildNav(); render(); } }
</script>
