<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#16a34a" />
<title>Money Matrix</title>

<!-- PWA manifest (inline so it's one file) -->
<link rel="manifest" href='data:application/manifest+json,{"name":"Money Matrix","short_name":"MoneyMatrix","start_url":".","display":"standalone","background_color":"%23ffffff","theme_color":"%2316a34a","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 rx=%2740%27 fill=%27%2316a34a%27/%3E%3Ctext x=%2796%27 y=%27130%27 font-size=%27110%27 text-anchor=%27middle%27 fill=%27white%27 font-family=%27Arial%27 font-weight=%27bold%27%3E%E2%82%B9%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}' />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%2316a34a'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%E2%82%B9%3C/text%3E%3C/svg%3E" />

<style>
  :root { --green:#16a34a; --green-d:#15803d; --bg:#f3f4f6; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb; --red:#dc2626; --amber:#d97706; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding-bottom:env(safe-area-inset-bottom); }
  .hidden { display:none !important; }
  button { font-family:inherit; cursor:pointer; border:none; }
  input,select,textarea { font-family:inherit; font-size:16px; }

  /* ---------- Login ---------- */
  #loginScreen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(160deg,#16a34a,#15803d); color:#fff; padding:24px; }
  #loginScreen h1 { margin:0; font-size:34px; }
  #loginScreen p { opacity:.9; margin:4px 0 28px; }
  .userPick { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .userBtn { width:96px; height:96px; border-radius:20px; background:rgba(255,255,255,.15); color:#fff; font-size:15px; font-weight:600; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; border:2px solid rgba(255,255,255,.25); }
  .userBtn .av { width:42px; height:42px; border-radius:50%; background:#fff; color:var(--green); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; }
  .userBtn.sel { background:#fff; color:var(--green); }
  .userBtn.sel .av { background:var(--green); color:#fff; }
  .pinBox { margin-top:26px; text-align:center; width:100%; max-width:300px; }
  #pinInput { width:100%; text-align:center; letter-spacing:12px; font-size:26px; padding:14px; border-radius:12px; border:none; margin-bottom:12px; color:#111; }
  .btnPrimary { width:100%; background:#fff; color:var(--green); font-weight:700; font-size:17px; padding:14px; border-radius:12px; }
  #loginErr { color:#fee2e2; min-height:20px; margin-top:10px; font-size:14px; }
  #syncState { position:fixed; top:0; left:0; right:0; text-align:center; font-size:12px; padding:4px; background:#111827; color:#fff; z-index:50; }

  /* ---------- App ---------- */
  header { background:var(--green); color:#fff; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:20; }
  header .who { font-size:13px; opacity:.9; }
  header .logout { background:rgba(255,255,255,.2); color:#fff; padding:7px 12px; border-radius:8px; font-size:13px; }
  main { padding:14px 14px 90px; max-width:760px; margin:0 auto; }

  .cards { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:18px; }
  .stat { background:var(--card); border-radius:14px; padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .stat .lbl { font-size:12px; color:var(--muted); }
  .stat .val { font-size:22px; font-weight:700; margin-top:4px; }
  .val.green{color:var(--green)} .val.amber{color:var(--amber)} .val.red{color:var(--red)}

  .secTitle { display:flex; justify-content:space-between; align-items:center; margin:18px 0 10px; }
  .secTitle h2 { font-size:17px; margin:0; }
  .addBtn { background:var(--green); color:#fff; border-radius:8px; padding:8px 12px; font-size:14px; font-weight:600; }

  .item { background:var(--card); border-radius:12px; padding:12px 14px; margin-bottom:10px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .item .top { display:flex; justify-content:space-between; gap:10px; }
  .item .name { font-weight:600; }
  .item .sub { font-size:13px; color:var(--muted); margin-top:3px; word-break:break-word; }
  .amt { font-weight:700; white-space:nowrap; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600; }
  .b-completed{background:#dcfce7;color:#15803d} .b-pending{background:#fef3c7;color:#92400e}
  .b-done{background:#dcfce7;color:#15803d}
  .rowActions { display:flex; gap:8px; margin-top:10px; }
  .rowActions button { font-size:12px; padding:6px 10px; border-radius:7px; background:#f3f4f6; color:#374151; }
  .rowActions .del { background:#fee2e2; color:var(--red); }
  .empty { text-align:center; color:var(--muted); padding:30px 10px; font-size:14px; }

  nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); display:flex; padding-bottom:env(safe-area-inset-bottom); z-index:20; }
  nav button { flex:1; background:none; padding:10px 0; font-size:11px; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; }
  nav button.active { color:var(--green); font-weight:700; }
  nav .ic { font-size:20px; }

  /* ---------- Modal ---------- */
  .modalBg { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index:40; }
  .modal { background:#fff; width:100%; max-width:560px; border-radius:18px 18px 0 0; padding:18px 18px 28px; max-height:90vh; overflow:auto; }
  @media(min-width:560px){ .modalBg{align-items:center} .modal{border-radius:18px} }
  .modal h3 { margin:0 0 14px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:5px; }
  .field input,.field select,.field textarea { width:100%; padding:11px; border:1px solid var(--border); border-radius:10px; }
  .modalBtns { display:flex; gap:10px; margin-top:8px; }
  .modalBtns button { flex:1; padding:12px; border-radius:10px; font-weight:600; font-size:15px; }
  .save { background:var(--green); color:#fff; } .cancel { background:#f3f4f6; color:#374151; }

  .toolsRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .toolsRow button{flex:1;min-width:130px;background:#f3f4f6;color:#374151;padding:11px;border-radius:10px;font-weight:600}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <h1>Money Matrix</h1>
  <p>Herbalife Business Tracker</p>
  <div class="userPick" id="userPick"></div>
  <div class="pinBox">
    <input id="pinInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••" />
    <button class="btnPrimary" id="loginBtn">Unlock</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div id="syncState">Connecting…</div>
  <header>
    <div>
      <div style="font-weight:700;font-size:17px">Money Matrix</div>
      <div class="who" id="whoLabel"></div>
    </div>
    <button class="logout" id="logoutBtn">Logout</button>
  </header>

  <main>
    <!-- DASHBOARD -->
    <section id="tab-dash">
      <div class="cards">
        <div class="stat"><div class="lbl">Total Received</div><div class="val green" id="sReceived">₹0</div></div>
        <div class="stat"><div class="lbl">Pending</div><div class="val amber" id="sPending">₹0</div></div>
        <div class="stat"><div class="lbl">Transactions</div><div class="val" id="sCount">0</div></div>
        <div class="stat"><div class="lbl">Team Members</div><div class="val" id="sMembers">0</div></div>
      </div>
      <div class="secTitle"><h2>Recent Transactions</h2></div>
      <div id="recentList"></div>
    </section>

    <!-- TRANSACTIONS -->
    <section id="tab-tx" class="hidden">
      <div class="secTitle"><h2>Transactions</h2><button class="addBtn" onclick="openTxModal()">+ Add</button></div>
      <div id="txList"></div>
    </section>

    <!-- MEMBERS -->
    <section id="tab-members" class="hidden">
      <div class="secTitle"><h2>Team Members</h2><button class="addBtn" onclick="openMemberModal()">+ Add</button></div>
      <div id="memberList"></div>
    </section>

    <!-- MORE -->
    <section id="tab-more" class="hidden">
      <div class="secTitle"><h2>Gifts</h2><button class="addBtn" onclick="openGiftModal()">+ Add</button></div>
      <div id="giftList"></div>
      <div class="secTitle"><h2>Data</h2></div>
      <div class="toolsRow">
        <button onclick="exportData()">⬇ Export Backup</button>
        <button onclick="document.getElementById('importFile').click()">⬆ Import Backup</button>
      </div>
      <input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)" />
      <p style="font-size:12px;color:var(--muted);margin-top:14px">Data syncs live across all logged-in devices. Import is a one-time migration of your old backup.</p>
    </section>
  </main>

  <nav>
    <button data-tab="dash" class="active" onclick="switchTab('dash')"><span class="ic">📊</span>Home</button>
    <button data-tab="tx" onclick="switchTab('tx')"><span class="ic">💰</span>Transactions</button>
    <button data-tab="members" onclick="switchTab('members')"><span class="ic">👥</span>Members</button>
    <button data-tab="more" onclick="switchTab('more')"><span class="ic">⚙️</span>More</button>
  </nav>
</div>

<div id="modalRoot"></div>

<!-- ============ APP LOGIC ============ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---- Firebase config (yours) ---- */
const firebaseConfig = {
  apiKey: "AIzaSyDNs_JNwPrB7vcw1OfMUS8kkOYxYaQ45YE",
  authDomain: "money-metrix-9f1da.firebaseapp.com",
  projectId: "money-metrix-9f1da",
  storageBucket: "money-metrix-9f1da.firebasestorage.app",
  messagingSenderId: "384847998438",
  appId: "1:384847998438:web:2dca6550d379dc5f25fa27",
  measurementId: "G-H3Y3TZXM4Q"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

/* ---- Users (PIN login). Change PINs here. ---- */
const USERS = [
  { id:"admin", name:"Admin", pin:"8888", role:"admin" },
  { id:"dad",   name:"Dad",   pin:"2619", role:"user"  },
  { id:"mom",   name:"Mom",   pin:"2619", role:"user"  }
];

const CUR = "₹";
const money = n => CUR + Number(n||0).toLocaleString("en-IN");
const fmtDate = d => { try { return new Date(d).toLocaleDateString("en-GB"); } catch { return ""; } };
const newId = () => "id_"+Date.now()+"_"+Math.random().toString(36).slice(2,9);

/* ---- Live state ---- */
let state = { transactions:[], members:[], gifts:[] };
let currentUser = null;
let unsub = [];

/* ===================== LOGIN ===================== */
const pick = document.getElementById("userPick");
let selUser = null;
USERS.forEach(u=>{
  const b=document.createElement("button");
  b.className="userBtn"; b.dataset.id=u.id;
  b.innerHTML=`<span class="av">${u.name[0]}</span>${u.name}`;
  b.onclick=()=>{ selUser=u; document.querySelectorAll(".userBtn").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); document.getElementById("pinInput").focus(); };
  pick.appendChild(b);
});
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("pinInput").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });

function doLogin(){
  const err=document.getElementById("loginErr");
  const pin=document.getElementById("pinInput").value.trim();
  if(!selUser){ err.textContent="Pick a user first."; return; }
  if(pin!==selUser.pin){ err.textContent="Wrong PIN."; return; }
  currentUser=selUser;
  sessionStorage.setItem("mm_user",selUser.id);
  startApp();
}
function tryRestore(){
  const id=sessionStorage.getItem("mm_user");
  if(id){ const u=USERS.find(x=>x.id===id); if(u){ currentUser=u; startApp(); } }
}

/* ===================== APP START / SYNC ===================== */
function startApp(){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("whoLabel").textContent = currentUser.name+" • "+currentUser.role;
  subscribe();
}
document.getElementById("logoutBtn").onclick = ()=>{
  unsub.forEach(fn=>fn()); unsub=[];
  sessionStorage.removeItem("mm_user");
  location.reload();
};

function subscribe(){
  const sync=document.getElementById("syncState");
  const cols=["transactions","members","gifts"];
  let ready=0;
  cols.forEach(c=>{
    const u=onSnapshot(collection(db,"sharedData",c,"items"),
      snap=>{
        state[c]=snap.docs.map(d=>({...d.data(), id:d.id}));
        ready++; if(ready>=cols.length){ sync.textContent="✓ Synced"; setTimeout(()=>sync.classList.add("hidden"),1500); }
        renderAll();
      },
      e=>{ sync.classList.remove("hidden"); sync.textContent="Sync error: "+e.code; }
    );
    unsub.push(u);
  });
}

/* ===================== SAVE / DELETE ===================== */
async function saveItem(coll,obj){
  if(!obj.id) obj.id=newId();
  if(!obj.ownerId) obj.ownerId=currentUser.id;
  await setDoc(doc(db,"sharedData",coll,"items",obj.id), obj);
}
async function removeItem(coll,id){
  if(!confirm("Delete this item?")) return;
  await deleteDoc(doc(db,"sharedData",coll,"items",id));
}
window.removeItem=removeItem;

/* ===================== RENDER ===================== */
function renderAll(){ renderDash(); renderTx(); renderMembers(); renderGifts(); }

function renderDash(){
  const tx=state.transactions;
  const received=tx.filter(t=>t.status==="completed").reduce((s,t)=>s+Number(t.amount||0),0);
  const pending=tx.filter(t=>t.status==="pending").reduce((s,t)=>s+Number(t.amount||0),0);
  document.getElementById("sReceived").textContent=money(received);
  document.getElementById("sPending").textContent=money(pending);
  document.getElementById("sCount").textContent=tx.length;
  document.getElementById("sMembers").textContent=state.members.length;
  const recent=[...tx].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  document.getElementById("recentList").innerHTML = recent.length? recent.map(txCard).join("") : `<div class="empty">No transactions yet.</div>`;
}
function txCard(t){
  return `<div class="item">
    <div class="top">
      <div><div class="name">${esc(t.customer)}</div><div class="sub">${esc(t.product||"")}${t.notes?" • "+esc(t.notes):""}</div>
      <div class="sub">${fmtDate(t.date)}</div></div>
      <div style="text-align:right"><div class="amt">${money(t.amount)}</div>
      <span class="badge b-${t.status}">${t.status}</span></div>
    </div>
    <div class="rowActions">
      <button onclick='editTx(${JSON.stringify(t)})'>Edit</button>
      <button class="del" onclick="removeItem('transactions','${t.id}')">Delete</button>
    </div></div>`;
}
function renderTx(){
  const tx=[...state.transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("txList").innerHTML = tx.length? tx.map(txCard).join("") : `<div class="empty">No transactions. Tap “+ Add”.</div>`;
}
function renderMembers(){
  const m=state.members;
  document.getElementById("memberList").innerHTML = m.length? m.map(mm=>`
    <div class="item"><div class="top">
      <div><div class="name">${esc(mm.name)}</div>
      <div class="sub">${esc(mm.phone||"")}${mm.email?" • "+esc(mm.email):""}</div>
      ${mm.notes?`<div class="sub">${esc(mm.notes)}</div>`:""}</div>
      <div style="text-align:right">
        <span class="badge b-${mm.firstKit==='completed'?'done':'pending'}">Kit1: ${mm.firstKit||'pending'}</span><br>
        <span class="badge b-${mm.secondKit==='completed'?'done':'pending'}" style="margin-top:4px;display:inline-block">Kit2: ${mm.secondKit||'pending'}</span>
      </div></div>
      <div class="rowActions">
        <button onclick='editMember(${JSON.stringify(mm)})'>Edit</button>
        <button class="del" onclick="removeItem('members','${mm.id}')">Delete</button>
      </div></div>`).join("") : `<div class="empty">No members yet.</div>`;
}
function renderGifts(){
  const g=state.gifts;
  document.getElementById("giftList").innerHTML = g.length? g.map(gg=>`
    <div class="item"><div class="top">
      <div><div class="name">${esc(gg.recipient)}</div>
      <div class="sub">${esc(gg.description||"")}${gg.occasion?" • "+esc(gg.occasion):""}</div></div>
      <div class="amt">${money(gg.value)}</div></div>
      <div class="rowActions">
        <button onclick='editGift(${JSON.stringify(gg)})'>Edit</button>
        <button class="del" onclick="removeItem('gifts','${gg.id}')">Delete</button>
      </div></div>`).join("") : `<div class="empty">No gifts logged.</div>`;
}
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ===================== MODALS ===================== */
const modalRoot=document.getElementById("modalRoot");
function closeModal(){ modalRoot.innerHTML=""; }
window.closeModal=closeModal;
function showModal(html){ modalRoot.innerHTML=`<div class="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }

window.openTxModal = (t={})=> showModal(`
  <h3>${t.id?"Edit":"Add"} Transaction</h3>
  <div class="field"><label>Customer</label><input id="f_customer" value="${esc(t.customer||"")}"></div>
  <div class="field"><label>Product / Note</label><input id="f_product" value="${esc(t.product||"")}"></div>
  <div class="field"><label>Amount (₹)</label><input id="f_amount" type="number" inputmode="numeric" value="${t.amount||""}"></div>
  <div class="field"><label>Status</label><select id="f_status">
    <option value="completed"${t.status==="completed"?" selected":""}>Completed</option>
    <option value="pending"${t.status==="pending"?" selected":""}>Pending</option></select></div>
  <div class="field"><label>Notes</label><textarea id="f_notes" rows="2">${esc(t.notes||"")}</textarea></div>
  <div class="modalBtns"><button class="cancel" onclick="closeModal()">Cancel</button>
  <button class="save" onclick='submitTx("${t.id||""}","${t.date||""}")'>Save</button></div>`);
window.editTx = t => openTxModal(t);
window.submitTx = (id,date)=>{
  const o={ id:id||undefined, date:date||new Date().toISOString(),
    customer:val("f_customer"), product:val("f_product"),
    amount:Number(val("f_amount")||0), status:val("f_status"), notes:val("f_notes") };
  if(o.status==="completed") o.completedDate=new Date().toISOString();
  if(!o.customer){ alert("Customer name required"); return; }
  saveItem("transactions",o).then(closeModal);
};

window.openMemberModal = (m={})=> showModal(`
  <h3>${m.id?"Edit":"Add"} Member</h3>
  <div class="field"><label>Name</label><input id="f_name" value="${esc(m.name||"")}"></div>
  <div class="field"><label>Phone</label><input id="f_phone" value="${esc(m.phone||"")}"></div>
  <div class="field"><label>Email</label><input id="f_email" value="${esc(m.email||"")}"></div>
  <div class="field"><label>First Kit</label><select id="f_k1">
    <option value="pending"${m.firstKit==="pending"?" selected":""}>Pending</option>
    <option value="completed"${m.firstKit==="completed"?" selected":""}>Completed</option></select></div>
  <div class="field"><label>Second Kit</label><select id="f_k2">
    <option value="pending"${m.secondKit==="pending"?" selected":""}>Pending</option>
    <option value="completed"${m.secondKit==="completed"?" selected":""}>Completed</option></select></div>
  <div class="field"><label>Notes</label><textarea id="f_mnotes" rows="2">${esc(m.notes||"")}</textarea></div>
  <div class="modalBtns"><button class="cancel" onclick="closeModal()">Cancel</button>
  <button class="save" onclick='submitMember("${m.id||""}","${m.joinDate||""}")'>Save</button></div>`);
window.editMember = m => openMemberModal(m);
window.submitMember = (id,joinDate)=>{
  const o={ id:id||undefined, joinDate:joinDate||new Date().toISOString(),
    name:val("f_name"), phone:val("f_phone"), email:val("f_email"),
    firstKit:val("f_k1"), secondKit:val("f_k2"), notes:val("f_mnotes") };
  if(!o.name){ alert("Name required"); return; }
  saveItem("members",o).then(closeModal);
};

window.openGiftModal = (g={})=> showModal(`
  <h3>${g.id?"Edit":"Add"} Gift</h3>
  <div class="field"><label>Recipient</label><input id="f_recipient" value="${esc(g.recipient||"")}"></div>
  <div class="field"><label>Description</label><input id="f_desc" value="${esc(g.description||"")}"></div>
  <div class="field"><label>Occasion</label><input id="f_occasion" value="${esc(g.occasion||"")}"></div>
  <div class="field"><label>Value (₹)</label><input id="f_value" type="number" value="${g.value||""}"></div>
  <div class="modalBtns"><button class="cancel" onclick="closeModal()">Cancel</button>
  <button class="save" onclick='submitGift("${g.id||""}","${g.date||""}")'>Save</button></div>`);
window.editGift = g => openGiftModal(g);
window.submitGift = (id,date)=>{
  const o={ id:id||undefined, date:date||new Date().toISOString(),
    recipient:val("f_recipient"), description:val("f_desc"),
    occasion:val("f_occasion"), value:Number(val("f_value")||0) };
  if(!o.recipient){ alert("Recipient required"); return; }
  saveItem("gifts",o).then(closeModal);
};
function val(id){ return document.getElementById(id).value.trim(); }

/* ===================== TABS ===================== */
window.switchTab=(t)=>{
  ["dash","tx","members","more"].forEach(x=>document.getElementById("tab-"+x).classList.toggle("hidden",x!==t));
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
};

/* ===================== EXPORT / IMPORT ===================== */
window.exportData=()=>{
  const out={ exportedAt:new Date().toISOString(), sharedData:state };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="moneymatrix_backup_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
};
window.importData=(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const data=JSON.parse(r.result);
      const sd=data.sharedData||data;
      if(!confirm("Import will add/overwrite items into the live shared database. Continue?")) return;
      const batch=writeBatch(db);
      ["transactions","members","gifts"].forEach(c=>{
        (sd[c]||[]).forEach(item=>{
          const id=item.id||newId();
          batch.set(doc(db,"sharedData",c,"items",id), {...item,id});
        });
      });
      await batch.commit();
      alert("Import complete — data is now syncing.");
    }catch(err){ alert("Import failed: "+err.message); }
  };
  r.readAsText(file);
};

/* ---- boot ---- */
tryRestore();
</script>
</body>
